<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMUNITIES | RAYDIN LABS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reusing core styles for consistency */
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-border: #333333;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            border-bottom: 1px solid var(--accent-border);
        }

        .logo-container img {
            height: 120px; 
            width: auto;
            mix-blend-mode: screen; 
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 1.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active { color: var(--text-main); }

        .page-header {
            padding: 4rem 3rem 2rem 3rem;
            border-bottom: 1px solid var(--accent-border);
        }

        .page-header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .page-header p {
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .content-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--accent-border);
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html"><img src="logo.jpeg" alt="Raydin Labs"></a>
        </div>
        <nav>
            <a href="research.html">Research</a>
            <a href="wiki.html">Wiki</a>
            <a href="diy.html">DIY</a>
            <a href="assets.html">Assets</a>
            <a href="faq.html">FAQ</a>
            <a href="communities.html" class="active">Communities</a>
        </nav>
    </header>

    <section class="page-header">
        <h1>Communities & Q&A</h1>
        <p>Ask questions regarding hardware, aerospace parameters, or DIY sourcing. Answers provided by lab lead.</p>
    </section>

    <main class="content-container">
        <script src="https://giscus.app/client.js"
                data-repo="JUSTKXIZEN/raydin-labs"
                data-repo-id="[ENTER_YOUR_REPO_ID_HERE]"
                data-category="Q&A"
                data-category-id="[ENTER_YOUR_CATEGORY_ID_HERE]"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="top"
                data-theme="dark"
                data-lang="en"
                crossorigin="anonymous"
                async>
        </script>
    </main>

    <footer>
        &copy; 2026 Raydin Labs. All systems operational.
    </footer>

</body>
</html>
